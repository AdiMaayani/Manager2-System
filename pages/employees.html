      <main class="main">
        <header class="topbar">
          <div class="topbar-brand">
            <img
              class="topbar-logo"
              src="../assets/manager2-logo.png"
              alt="ManageR²"
            />
            <div class="topbar-title-wrap">
              <h1 class="topbar-title">עובדים</h1>
            </div>
          </div>
        </header>

        <div class="content">
          <section class="section">
            <div class="card employees-controls">
              <div class="employees-controls-layout">
                <div class="employees-controls-left">
                  <button
                    type="button"
                    class="btn btn-primary btn-compact"
                    id="btn-new-employee"
                  >
                    <i
                      data-lucide="plus-circle"
                      class="icon"
                      aria-hidden="true"
                    ></i>
                    עובד חדש
                  </button>
                </div>

                <div class="employees-controls-right">
                  <div
                    style="
                      display: flex;
                      flex-direction: column;
                      gap: var(--spacing-sm);
                      width: 100%;
                    "
                  >
                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: var(--spacing-sm);
                        flex-wrap: wrap;
                      "
                    >
                      <span
                        style="
                          font-size: var(--font-size-sm);
                          color: var(--color-neutral-700);
                          font-weight: 600;
                          min-width: 60px;
                        "
                        >תפקידים:</span
                      >
                      <div
                        class="employees-filter-group"
                        id="employees-role-filters"
                      ></div>
                    </div>

                    <div
                      style="
                        display: flex;
                        align-items: center;
                        gap: var(--spacing-sm);
                        flex-wrap: wrap;
                      "
                    >
                      <span
                        style="
                          font-size: var(--font-size-sm);
                          color: var(--color-neutral-700);
                          font-weight: 600;
                          min-width: 60px;
                        "
                        >מחלקות:</span
                      >
                      <div
                        class="employees-filter-group"
                        id="employees-department-filters"
                      ></div>
                    </div>

                    <div class="search-input relative">
                      <input
                        type="text"
                        class="input"
                        placeholder=" ⌕ חיפוש עובד לפי שם/טלפון/אימייל/הערות..."
                      />
                      <span class="search-icon" aria-hidden="true"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="table-container">
              <table class="table" id="employees-table">
                <thead>
                  <tr>
                    <th>שם</th>
                    <th>תפקיד</th>
                    <th>זמינות</th>
                    <th>כניסה אחרונה</th>
                    <th>שיבוץ היום</th>
                    <th>דיווחים פתוחים</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div id="employee-modal" class="modal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h3 class="modal-title">כרטיס עובד</h3>
            <p
              id="employee-modal-subtitle"
              style="
                margin: 0;
                font-size: var(--font-size-sm);
                color: var(--color-neutral-600);
                margin-top: var(--spacing-xs);
              "
            ></p>
          </div>
          <button type="button" class="modal-close" aria-label="סגור">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group" id="employee-field-employee-id">
            <label>מס׳ עובד בחברה</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <input type="number" class="input" value="" min="1" />
            </div>
          </div>

          <div class="form-group" id="employee-field-name">
            <label>שם מלא</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <input type="text" class="input" value="" />
            </div>
          </div>

          <div class="form-group" id="employee-field-password">
            <label>סיסמה</label>
            <div class="field-value">••••••••</div>
            <div class="field-input" style="display: none">
              <input type="password" class="input" value="" />
            </div>
          </div>

          <div class="form-group" id="employee-field-role">
            <label>תפקיד</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <input type="text" class="input" value="" />
            </div>
          </div>

          <div class="form-group" id="employee-field-roles">
            <label>תפקידים</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <select
                id="employee-roles-select"
                class="select"
                multiple
                size="5"
              ></select>
            </div>
          </div>

          <div class="form-group" id="employee-field-departments">
            <label>מחלקות</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <select
                id="employee-departments-select"
                class="select"
                multiple
                size="5"
              ></select>
            </div>
          </div>

          <div class="form-group" id="employee-field-phone">
            <label>טלפון</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <input type="tel" class="input" value="" />
            </div>
          </div>

          <div class="form-group" id="employee-field-email">
            <label>אימייל</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <input type="email" class="input" value="" />
            </div>
          </div>

          <div class="form-group" id="employee-field-status">
            <label>סטטוס</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <select class="select">
                <option value="זמין">זמין</option>
                <option value="עמוס">עמוס</option>
                <option value="בשירות">בשירות</option>
                <option value="לא פעיל">לא פעיל</option>
              </select>
            </div>
          </div>

          <div class="form-group" id="employee-field-last-login">
            <label>כניסה אחרונה</label>
            <div class="field-value"></div>
          </div>

          <div class="form-group" id="employee-field-notes">
            <label>הערות</label>
            <div class="field-value"></div>
            <div class="field-input" style="display: none">
              <textarea class="textarea" rows="3"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <div
            id="employee-view-actions"
            style="
              display: flex;
              gap: var(--spacing-md);
              width: 100%;
              justify-content: flex-end;
            "
          >
            <button
              type="button"
              class="btn btn-primary"
              id="btn-edit-employee"
            >
              עריכה
            </button>
          </div>
          <div
            id="employee-edit-actions"
            style="
              display: none;
              flex-direction: row;
              gap: var(--spacing-md);
              width: 100%;
              justify-content: flex-end;
              align-items: center;
            "
          >
            <button
              type="button"
              class="btn btn-secondary"
              id="btn-cancel-employee"
            >
              ביטול
            </button>
            <button
              type="button"
              class="btn btn-primary"
              id="btn-save-employee"
            >
              שמור
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/employees.js"></script>
    <script>
      if (window.lucide) lucide.createIcons();
    </script>
  </body>
</html>
